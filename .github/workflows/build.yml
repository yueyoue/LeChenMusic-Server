name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build UI
        run: cd ui && npm run build -- --outDir=../ui/build

      - name: Build Go binary
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          GIT_TAG=$(git describe --tags --always --dirty 2>/dev/null || echo "$GIT_SHA")
          go build -tags netgo,sqlite_fts5 \
            -ldflags="-w -s -X github.com/navidrome/navidrome/consts.gitSha=${GIT_SHA} -X github.com/navidrome/navidrome/consts.gitTag=${GIT_TAG}" \
            -o navidrome .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        id: docker-push
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ github.ref_name }}

      - name: Debug push failure
        if: steps.docker-push.outcome == 'failure'
        run: |
          echo "❌ Docker push failed!"
          echo "Outcome: ${{ steps.docker-push.outcome }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Trying single-platform push as fallback..."
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest 2>&1 || echo "Single push also failed"

      - name: Fail if push failed
        if: steps.docker-push.outcome == 'failure'
        run: exit 1

      - name: Verify GHCR push
        run: |
          echo "=== Docker Push Result ==="
          echo "Outcome: ${{ steps.docker-push.outcome }}"
          echo "Digest: ${{ steps.docker-push.outputs.digest }}"
          echo "ImageID: ${{ steps.docker-push.outputs.imageid }}"
          echo "=== Tags pushed ==="
          echo "${{ steps.meta.outputs.tags }}"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: navidrome
