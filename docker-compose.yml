services:
  lechen-music:
    build: .
    container_name: lechen-music
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - JWT_SECRET=lechen-music-secret-key
      - MAX_TRANSCODE_TASKS=4
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      # ↓↓↓ 改成你的音乐文件夹路径 ↓↓↓
      - /vol1/1000/音乐:/music:ro
