version: '3'
services:
  lechen-music:
    build: .
    image: lechen-music:latest
    container_name: lechen-music
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/lechen.db
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - MAX_TRANSCODE_TASKS=4
      - TRANSCODE_CACHE_DIR=/app/data/transcode-cache
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data                     # 数据库、配置、转码缓存
      - /path/to/music:/music:ro             # 本地音乐目录（按需修改路径）
      # - /mnt/nas/music:/music:ro           # NAS 挂载目录示例
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
